services:
  postgres:
    image: postgres:16-alpine
    container_name: ethiobooks-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ethiobooks}
      POSTGRES_USER: ${POSTGRES_USER:-ethiobooks}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ethiobooks}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ethiobooks"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ethiobooks-api
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      UPLOAD_DIR: ${UPLOAD_DIR:-/data/uploads}
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-ethiobooks}
      DB_USERNAME: ${POSTGRES_USER:-ethiobooks}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-ethiobooks}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-at-least-256-bits-secret-key-here}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION:-900000}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-604800000}
      GOOGLE_CLIENT_IDS: ${GOOGLE_CLIENT_IDS:-}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:4200,http://127.0.0.1:4200,http://localhost:3000,http://localhost:*,http://127.0.0.1:*}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:4200}
      MAIL_HOST: ${MAIL_HOST:-}
      MAIL_PORT: ${MAIL_PORT:-1025}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_SMTP_AUTH: ${MAIL_SMTP_AUTH:-false}
      MAIL_SMTP_STARTTLS: ${MAIL_SMTP_STARTTLS:-false}
      MAIL_FROM: ${MAIL_FROM:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      OTP_PHONE_ENABLED: ${OTP_PHONE_ENABLED:-false}
      OTP_SECRET: ${OTP_SECRET:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - upload_data:/data/uploads

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: ethiobooks-web
    depends_on:
      - api
    ports:
      - "4200:80"

volumes:
  postgres_data:
  upload_data:
