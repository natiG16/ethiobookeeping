spring:
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  application:
    name: ethiobooks-api
  config:
    # Load repo-root .env when running `mvn spring-boot:run` from backend/
    import: optional:file:../.env[.properties],optional:file:.env[.properties]
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ethiobooks}
    username: ${DB_USERNAME:ethiobooks}
    password: ${DB_PASSWORD:ethiobooks}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: Africa/Addis_Ababa
  flyway:
    enabled: true
    locations: classpath:db/migration
  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:false}

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api
  tomcat:
    max-http-form-post-size: 5MB
    max-swallow-size: 5MB

app:
  upload:
    # Absolute path avoids missing avatars when the JVM working directory changes between runs.
    dir: ${UPLOAD_DIR:${user.dir}/uploads}
    max-size-bytes: 2097152
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-use-at-least-256-bits-secret-key-here}
    access-token-expiration-ms: ${JWT_ACCESS_EXPIRATION:900000}
    refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRATION:604800000}
  cors:
    # Comma-separated origins or patterns (e.g. http://localhost:*)
    allowed-origins: ${CORS_ORIGINS:http://localhost:4200,http://127.0.0.1:4200,http://localhost:3000,http://localhost:*,http://127.0.0.1:*,http://192.168.*:*,http://10.*:*}
  default-locale: en
  admin:
    email: ${ADMIN_EMAIL:}
    password: ${ADMIN_PASSWORD:}
  google:
    # Comma-separated OAuth 2.0 client IDs from Google Cloud Console
    client-ids: ${GOOGLE_CLIENT_IDS:}
  mail:
    from: ${MAIL_FROM:mysuq <noreply@localhost>}
    frontend-url: ${FRONTEND_URL:http://localhost:4200}
    verification-ttl-hours: ${MAIL_VERIFICATION_TTL_HOURS:24}
  otp:
    phone-enabled: ${OTP_PHONE_ENABLED:false}
    secret: ${OTP_SECRET:change-me-otp-secret}
    ttl-seconds: ${OTP_TTL_SECONDS:300}
    max-attempts: ${OTP_MAX_ATTEMPTS:5}
    max-sends-per-10m: ${OTP_MAX_SENDS_10M:3}
    telegram:
      bot-token: ${TELEGRAM_BOT_TOKEN:}
      chat-id: ${TELEGRAM_CHAT_ID:}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.ethiobooks: INFO
    org.springframework.security: WARN
