name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ethiobooks
          POSTGRES_USER: ethiobooks
          POSTGRES_PASSWORD: ethiobooks
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ethiobooks"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Backend tests
        working-directory: backend
        run: mvn -B test

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        working-directory: web
        run: npm ci
      - name: Unit tests
        working-directory: web
        run: npm run test:ci
      - name: Production build
        working-directory: web
        run: npm run build:prod
